version: "3.8"

services:
  # 数据库
  postgres:
    image: postgres:15-alpine
    container_name: knowledge-postgres
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 对象存储
  minio:
    image: minio/minio:latest
    container_name: knowledge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # 搜索引擎
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: knowledge-meilisearch
    ports:
      - "7700:7700"
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # 认证中心
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: knowledge-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: 47.79.145.215
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_PROXY: "edge"
      KC_HTTP_RELATIVE_PATH: /auth
      # 内存优化配置
      JAVA_OPTS_APPEND: "-Xms128m -Xmx256m -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=128m"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledge-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  # 统一门户
  portal:
    build: ./portal
    container_name: knowledge-portal
    environment:
      VITE_KEYCLOAK_URL: http://47.79.145.215:8080/auth
      VITE_MEILISEARCH_URL: http://47.79.145.215:8080/storage
    networks:
      - knowledge-network
    restart: unless-stopped

  # 反向代理
  nginx:
    image: nginx:alpine
    container_name: knowledge-nginx
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - portal
      - keycloak
      - gitea
      - nextcloud
      - minio
      - plane-proxy
    networks:
      - knowledge-network
    restart: unless-stopped

  # 知识库
  dokuwiki:
    image: ghcr.io/linuxserver/dokuwiki:latest
    container_name: knowledge-dokuwiki
    environment:
      DOKUWIKI_USERNAME: admin
      DOKUWIKI_PASSWORD: ${DOKUWIKI_PASSWORD}
      DOKUWIKI_EMAIL: admin@company.local
      DOKUWIKI_WIKI_NAME: Knowledge Platform
    volumes:
      - dokuwiki-data:/bitnami/dokuwiki
    networks:
      - knowledge-network
    restart: unless-stopped

  # 代码托管
  gitea:
    image: gitea/gitea:latest
    container_name: knowledge-gitea
    environment:
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: postgres:5432
      GITEA__database__NAME: gitea
      GITEA__database__USER: ${POSTGRES_USER}
      GITEA__database__PASSWD: ${POSTGRES_PASSWORD}
      GITEA__server__ROOT_URL: https://${DOMAIN}/code/
      GITEA__server__SSH_DOMAIN: ${DOMAIN}
      GITEA__server__SSH_PORT: 2222
      GITEA__openid__ENABLE_OPENID_SIGNIN: "true"
      GITEA__openid__ENABLE_OPENID_SIGNUP: "false"
      GITEA__lfs__START_SERVER: "true"
      GITEA__lfs__STORAGE_TYPE: minio
      GITEA__lfs__MINIO_ENDPOINT: minio:9000
      GITEA__lfs__MINIO_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      GITEA__lfs__MINIO_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      GITEA__lfs__MINIO_BUCKET: gitea-lfs
      GITEA__lfs__MINIO_USE_SSL: "false"
    ports:
      - "2222:22"
    volumes:
      - gitea-data:/var/lib/gitea
      - gitea-repos:/data/git
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledge-network
    restart: unless-stopped

  # 任务看板 - Plane
  plane-web:
    image: makeplane/plane-frontend:latest
    container_name: knowledge-plane-web
    command: node web/server.js
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://plane-api:8000
      NEXT_PUBLIC_DEPLOY_URL: http://47.79.145.215:8080/tasks
      WEB_URL: http://47.79.145.215:8080/tasks
    depends_on:
      - plane-api
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-admin:
    image: makeplane/plane-admin:latest
    container_name: knowledge-plane-admin
    command: node admin/server.js
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://plane-api:8000
    depends_on:
      - plane-api
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-space:
    image: makeplane/plane-space:latest
    container_name: knowledge-plane-space
    command: node space/server.js
    working_dir: /app
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://plane-api:8000
    depends_on:
      - plane-api
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-migrator:
    image: makeplane/plane-backend:latest
    container_name: knowledge-plane-migrator
    command: ./bin/docker-entrypoint-migrator.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plane
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://plane-redis:6379/
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: plane
      RABBITMQ_PASSWORD: plane123
      RABBITMQ_VHOST: plane
      SECRET_KEY: ${MEILI_MASTER_KEY}
      DOCKERIZED: 1
    depends_on:
      postgres:
        condition: service_healthy
      plane-redis:
        condition: service_started
    networks:
      - knowledge-network
    restart: "no"

  plane-api:
    image: makeplane/plane-backend:latest
    container_name: knowledge-plane-api
    command: ./bin/docker-entrypoint-api.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plane
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://plane-redis:6379/
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: plane
      RABBITMQ_PASSWORD: plane123
      RABBITMQ_VHOST: plane
      SECRET_KEY: ${MEILI_MASTER_KEY}
      WEB_URL: http://47.79.145.215:8080/tasks
      CORS_ALLOWED_ORIGINS: "http://47.79.145.215:8080"
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET_NAME: plane-uploads
      DOCKERIZED: 1
      USE_MINIO: 1
    depends_on:
      postgres:
        condition: service_healthy
      plane-redis:
        condition: service_started
      plane-mq:
        condition: service_started
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-worker:
    image: makeplane/plane-backend:latest
    container_name: knowledge-plane-worker
    command: ./bin/docker-entrypoint-worker.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plane
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://plane-redis:6379/
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: plane
      RABBITMQ_PASSWORD: plane123
      RABBITMQ_VHOST: plane
      SECRET_KEY: ${MEILI_MASTER_KEY}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_BUCKET_NAME: plane-uploads
      DOCKERIZED: 1
      USE_MINIO: 1
    depends_on:
      postgres:
        condition: service_healthy
      plane-redis:
        condition: service_started
      plane-mq:
        condition: service_started
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-beat:
    image: makeplane/plane-backend:latest
    container_name: knowledge-plane-beat
    command: ./bin/docker-entrypoint-beat.sh
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plane
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://plane-redis:6379/
      RABBITMQ_HOST: plane-mq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: plane
      RABBITMQ_PASSWORD: plane123
      RABBITMQ_VHOST: plane
      SECRET_KEY: ${MEILI_MASTER_KEY}
      DOCKERIZED: 1
    depends_on:
      postgres:
        condition: service_healthy
      plane-redis:
        condition: service_started
      plane-mq:
        condition: service_started
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-live:
    image: makeplane/plane-live:latest
    container_name: knowledge-plane-live
    command: node live/dist/server.js
    working_dir: /app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: plane
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      REDIS_URL: redis://plane-redis:6379/
      RABBITMQ_URL: amqp://plane:plane123@plane-mq:5672/plane
    depends_on:
      - plane-redis
      - plane-mq
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-proxy:
    image: makeplane/plane-proxy:latest
    container_name: knowledge-plane-proxy
    environment:
      FILE_SIZE_LIMIT: "52428800"
      BUCKET_NAME: "uploads"
    depends_on:
      - plane-web
      - plane-admin
      - plane-space
      - plane-api
      - plane-live
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-redis:
    image: valkey/valkey:7.2-alpine
    container_name: knowledge-plane-redis
    networks:
      - knowledge-network
    restart: unless-stopped

  plane-mq:
    image: rabbitmq:3.13-alpine
    container_name: knowledge-plane-mq
    environment:
      RABBITMQ_DEFAULT_USER: plane
      RABBITMQ_DEFAULT_PASS: plane123
      RABBITMQ_DEFAULT_VHOST: plane
    networks:
      - knowledge-network
    restart: unless-stopped

  # 试验数据网盘
  nextcloud:
    image: nextcloud:latest
    container_name: knowledge-nextcloud
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: nextcloud
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      NEXTCLOUD_TRUSTED_DOMAINS: ${DOMAIN}
      OBJECTSTORE_S3_HOST: minio
      OBJECTSTORE_S3_PORT: 9000
      OBJECTSTORE_S3_BUCKET: nextcloud-data
      OBJECTSTORE_S3_KEY: ${MINIO_ROOT_USER}
      OBJECTSTORE_S3_SECRET: ${MINIO_ROOT_PASSWORD}
      OBJECTSTORE_S3_USE_SSL: "false"
    volumes:
      - nextcloud-data:/var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledge-network
    restart: unless-stopped

networks:
  knowledge-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  meili-data:
  keycloak-data:
  dokuwiki-data:
  gitea-data:
  gitea-repos:
  plane-data:
  nextcloud-data:
