version: "3.8"

services:
  # 数据库
  postgres:
    image: postgres:15-alpine
    container_name: knowledge-postgres
    environment:
      POSTGRES_DB: knowledge
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # 对象存储
  minio:
    image: minio/minio:latest
    container_name: knowledge-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    restart: unless-stopped

  # 搜索引擎
  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: knowledge-meilisearch
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meili-data:/meili_data
    networks:
      - knowledge-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # 认证中心
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: knowledge-keycloak
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: ${POSTGRES_USER}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${DOMAIN}
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    command: start-dev
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - knowledge-network
    restart: unless-stopped

  # 反向代理
  nginx:
    image: nginx:alpine
    container_name: knowledge-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - portal
      - keycloak
      - dokuwiki
      - gitea
      - plane
      - nextcloud
      - minio
    networks:
      - knowledge-network
    restart: unless-stopped

  # 知识库
  dokuwiki:
    image: bitnami/dokuwiki:latest
    container_name: knowledge-dokuwiki
    environment:
      DOKUWIKI_USERNAME: admin
      DOKUWIKI_PASSWORD: ${DOKUWIKI_PASSWORD}
      DOKUWIKI_EMAIL: admin@company.local
      DOKUWIKI_WIKI_NAME: Knowledge Platform
    volumes:
      - dokuwiki-data:/bitnami/dokuwiki
    networks:
      - knowledge-network
    restart: unless-stopped

networks:
  knowledge-network:
    driver: bridge

volumes:
  postgres-data:
  minio-data:
  meili-data:
  keycloak-data:
  dokuwiki-data:
  gitea-data:
  gitea-repos:
  plane-data:
  nextcloud-data:
